<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD</title>
    <link rel="stylesheet" href="style.css">

    <!--bootstrap, mas so deves estar online-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

</head>
<body>
    <div class="title">
        <h1>Oh Crud!</h1>
        <p>Things I forgot To Do</p>
    </div>
    <div class="form">
        <form action="javascript:void(0);" method="post" onsubmit="app.add()">
            <input type="text" id="add-todo" placeholder="Things To-Do">
            <input type="submit" value="Add" class="btn btn-primary">
        </form>
        <p>You have:</p>
        <p id="counter"></p>
        <table>
            <tr class="to-do">
                <th><h3>To-Do:</h3></th>
            </tr>
            <tbody id="tasks">
                
            </tbody>
        </table>
    </div>
    <div id="edit-box" role="aria-hidden">
        <form action="javascript:void(0);" method="post" id="save-edit">
            <input type="text"  id="edit-todo">
            <input type="submit" value="Save" class="btn btn-success">
            <a onclick="closeInput()" aria-label="close">&#10006;</a>
        </form>
    </div>


    <script src="script.js"></script>
</body>
</html>




<!--HTML, CSS, and JavaScript CRUD Website in 30min _ Start to Finish Tutorial-->

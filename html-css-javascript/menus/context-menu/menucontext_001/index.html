<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu de Contexto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Faça um Click direito do mouse ou rato</h1>
    <div id="contextmenu">
        <div class="list">
            <div class="item">
                <i>Autoassign</i>
            </div>
            <div class="item">
                <i>Assign</i>
            </div>
        </div>
        <div class="list">
            <div class="item">
                <i>Edit</i>
            </div>
            <div class="item">
                <i>Clone</i>
            </div>
        </div>
        <div class="list">
            <div class="item">
                <i>Zoom to route</i>
            </div>
            <div class="item">
                <i>Announce task</i>
            </div>
        </div>
        <div class="list">
            <div class="item">
                <i>Unassign</i>
            </div>
            <div class="item">
                <i>Unlink</i>
            </div>
            <div class="item">
                <i>Delete</i>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>



<!--Create Custom Context Menu _ Right Click Menu using HTML, CSS & JavaScript-->

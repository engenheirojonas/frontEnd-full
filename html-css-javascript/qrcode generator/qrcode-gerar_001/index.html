<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Qr Code Generator</h1>
            <p>Type a url or text to generate Qr Code</p>
        </div>
        <div class="input-form">
            <input type="text" class="qr-input" placeholder="Enter url or text">
            <button class="generate-btn">Generate Qr Code</button>
        </div>
        <div class="qr-code">
            <img src="icon-pc.png" class="qr-image" alt="QrCode">
        </div>
    </div>

    <script src="script.js"></script>


</body>
</html>

<!--How to Create a QR Code Generator Using Html, Css and Javascript **** OK-->
